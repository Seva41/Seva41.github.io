<!-- _layouts/default.html -->
<!DOCTYPE html>
<html lang="{{ page.lang | default: 'es' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="{{ page.description }}" />
    <title>{{ page.title }}</title>
    <!-- Establece la clase de idioma antes de pintar para evitar FOUC -->
    <script>(function(){var l=localStorage.getItem('idiomaSeleccionado')||'es';document.documentElement.classList.add('lang-'+l);})();</script>
    <link rel="stylesheet" href="{{ '/style.css?v=1.2' | relative_url }}" />
    <link
      rel="icon"
      href="{{ '/assets/icons/favicon.ico?v=1.0' | relative_url }}"
      type="image/x-icon"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ '/assets/icons/favicon-16x16.png?v=1.0' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ '/assets/icons/favicon-32x32.png?v=1.0' | relative_url }}"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ '/assets/icons/apple-touch-icon.png?v=1.0' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="{{ '/assets/icons/android-chrome-192x192.png?v=1.0' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="{{ '/assets/icons/android-chrome-512x512.png?v=1.0' | relative_url }}"
    />

    <!-- Web App Manifest -->
    <link
      rel="manifest"
      href="{{ '/assets/icons/site.webmanifest?v=1.0' | relative_url }}"
    />
    <!-- Scripts con defer: no bloquean el render y se ejecutan en orden -->
    <script defer src="{{ '/assets/js/main.js?v=1.1' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/experience-detail.js?v=1.1' | relative_url }}"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Saltar al contenido / Skip to main content</a>
    <div id="particles-js" aria-hidden="true"></div>
    {% include navbar.html %}
    {{ content }} {% include footer.html %}
    <!-- particles.js desde CDN al final del body -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" integrity="sha384-d+UOwmNNIC7V4izkTAKSXzWhjC2GxiS9PTykO1XdOPC3nc2z65UOS7SP6QdKPA70" crossorigin="anonymous"></script>
    <script src="{{ '/assets/js/particles.js?v=1.0' | relative_url }}"></script>
    <script>
      /* Fade-in suave del fondo de partículas tras carga completa */
      window.addEventListener('load', function() {
        var p = document.getElementById('particles-js');
        if (!p) return;
        p.classList.add('particles-prep');
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            p.classList.add('particles-ready');
          });
        });
      });
    </script>
  </body>
</html>
